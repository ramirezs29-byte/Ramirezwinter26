<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deep Sea Adventure by Sofia</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>Deep Sea Adventure by Sofia</h1>
      <img src="example1.jpg" alt="example 2" />
      <p>paragraph content goes here</p>
      <h2>Character Creation</h2>
      <form action="scene1.html" method="GET">
        <label for="full-name">Full Name:</label>
        <input type="text" id="full-name" name="fullname" required />

        <label for="age-range">Age Range:</label>
        <select id="age-range" name="age-range" required>
          <option value="">-- Select --</option>
          <option value="child">Child (0-12)</option>
          <option value="teen">Teen (13-17)</option>
          <option value="adult">Adult (18 and up)</option>
        </select>

        <label for="description">Description:</label>
        <textarea
          id="description"
          name="description"
          rows="4"
          required
        ></textarea>

        <button type="submit">Submit</button>
      </form>
    </main>
  </body>
</html>
